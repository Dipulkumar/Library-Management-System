<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Book</title>
    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }
        .form-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #0056b3;
        }
        .btn-custom {
            background-color: #0056b3;
            color: white;
        }
        .btn-custom:hover {
            background-color: #007bff;
        }
        .btn-cancel {
            background-color: #6c757d;
            color: white;
        }
        .btn-cancel:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Edit Book</h2>
    <form th:action="@{/books/update}" th:object="${book}" method="post">
        <input type="hidden" th:field="*{Id}" />

        <div class="mb-3">
            <label class="form-label">Title:</label>
            <input type="text" th:field="*{title}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Author:</label>
            <input type="text" th:field="*{author}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Genre:</label>
            <input type="text" th:field="*{genre}" class="form-control" />
        </div>
        <div class="mb-3">
            <label class="form-label">Quantity:</label>
            <input type="number" th:field="*{quantity}" class="form-control" min="0" />
        </div>
        <div class="mb-3">
            <label class="form-label">Publisher:</label>
            <input type="text" th:field="*{publisher}" class="form-control" />
        </div>
        <div class="mb-3">
            <label class="form-label">Publish Year:</label>
            <input type="date" th:field="*{publisherYear}" class="form-control" />
        </div>
        <div class="mb-3">
            <label class="form-label">ISBIN:</label>
            <input type="text" th:field="*{ISBIN}" class="form-control" />
        </div>
        <div class="mb-3">
            <label class="form-label">Edition:</label>
            <input type="text" th:field="*{edition}" class="form-control" />
        </div>
        <div class="mb-3">
            <label class="form-label">Price:</label>
            <input type="number" th:field="*{price}" step="0.01" min="0" class="form-control" />
        </div>

        <div class="d-flex justify-content-center mt-4">
            <button type="submit" class="btn btn-custom me-2">Update</button>
            <a href="/books" class="btn btn-cancel">Cancel</a>
        </div>
    </form>
</div>

<!-- Bootstrap JS (optional) -->
<script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
