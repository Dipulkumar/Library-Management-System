<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Library Management | Setting</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS + Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/common.css}" />
</head>
<body>
<div class="wrapper">
    <div th:replace="fragments/sidebar :: sidebar(activePage='settings')"></div>

    <div class="mainContent">
        <div th:replace="fragments/header :: header(name=${name}, email=${email}, pageTitle='Settings')"></div>

        <div class="content">
           <!-- Form starts -->
            <form th:action="@{/setting/save}" th:object="${settingsForm}"   method="post">

                <table class="table table-bordered table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Setting Name</th>
                            <th>Display Name</th>
                            <th>Value</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="setting, iterStat : *{settings}">
                            <td th:text="${iterStat.index + 1}"></td>

                             <td>
						        <span th:text="${setting.settingName}"></span>
						    </td>

                            <td>
						        <span th:text="${setting.settingDisplayName}"></span>
						    </td>

                            <td>
			                    <input type="text" th:field="*{settings[__${iterStat.index}__].settingValue}" class="form-control"/>
			                    <input type="hidden" th:field="*{settings[__${iterStat.index}__].settingId}" />
			                </td>
                        </tr>
                    </tbody>
                </table>

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Save Settings
                </button>
            </form>
            <!-- Form ends -->

            <!-- Success message -->
            <div th:if="${param.success}">
                <p class="alert alert-success mt-3">✅ Settings saved successfully!</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
