<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Library Management System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            padding: 40px 30px;
            border-radius: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-card h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #0056b3;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .btn-login,
        .btn-registration {  /* ✅ same base styling */
            display: block;   /* ✅ makes <a> behave like button */
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;   /* ✅ center text for <a> */
            text-decoration: none; /* ✅ remove underline from <a> */
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px; /* ✅ add spacing */
        }
        .btn-login {
            background-color: #007BFF;
            color: white;
        }
        .btn-login:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        .btn-registration {
            background-color: #800000; /* Maroon */
            color: white;
        }
        .btn-registration:hover {
            background-color: #600000;
            transform: translateY(-2px);
        }
        .message {
            text-align: center;
            margin-top: 15px;
            font-size: 0.95rem;
        }
        .message.error {
            color: red;
        }
        .message.info {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Login</h2>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Username:</label>
                <input type="text" name="username" required/>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" required/>
            </div>
            <button type="submit" class="btn-login">Login</button>
            
            <div th:if="${param.error}" class="message error">
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="message info">
                You have been logged out.
            </div>
        </form>
        <!-- ✅ Registration button (same size as login) -->
        <a th:href="@{/registration}" class="btn-registration">Registration</a>
    </div>
</body>
</html>
