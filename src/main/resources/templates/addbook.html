<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Book</title>
    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #6fb1fc, #4364f7);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
        }
        .form-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #4364f7;
        }
        .btn-custom {
            background-color: #4364f7;
            color: #fff;
        }
        .btn-custom:hover {
            background-color: #6fb1fc;
        }
        a.cancel-link {
            margin-left: 1rem;
            color: #4364f7;
            text-decoration: none;
        }
        a.cancel-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Add New Book</h2>
        <form th:action="@{/books/add}" th:object="${book}" method="post">
            <div class="mb-3">
                <label class="form-label">Title:</label>
                <input type="text" th:field="*{title}" class="form-control" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Author:</label>
                <input type="text" th:field="*{author}" class="form-control" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Genre:</label>
                <input type="text" th:field="*{genre}" class="form-control" />
            </div>

            <div class="mb-3">
                <label class="form-label">Quantity:</label>
                <input type="number" th:field="*{quantity}" min="0" class="form-control" />
            </div>

            <div class="mb-3">
                <label class="form-label">Publisher:</label>
                <input type="text" th:field="*{publisher}" class="form-control" />
            </div>

            <div class="mb-3">
                <label class="form-label">Publish Year:</label>
                <input type="date" th:field="*{publisherYear}" class="form-control" />
            </div>

            <div class="mb-3">
                <label class="form-label">ISBIN:</label>
                <input type="text" th:field="*{ISBIN}" class="form-control" />
            </div>

            <div class="mb-3">
                <label class="form-label">Edition:</label>
                <input type="text" th:field="*{edition}" class="form-control" />
            </div>

            <div class="mb-3">
                <label class="form-label">Price:</label>
                <input type="number" th:field="*{price}" step="0.01" min="0" class="form-control" />
            </div>

            <div class="d-flex justify-content-center mt-4">
                <button type="submit" class="btn btn-custom">Add Book</button>
                <a href="/books" class="cancel-link">Cancel</a>
            </div>
        </form>
    </div>

    <!-- Bootstrap JS (optional, only needed if you use components like dropdowns) -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>
</body>
</html>
