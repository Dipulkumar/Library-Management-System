<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!-- Sidebar -->
   <div th:fragment="sidebar(activePage)" class="sidebar" id="sidebar">
       <div class="p-3">
           <h4 class="text-center text-white mb-4">DLMS</h4>
           <ul class="nav nav-pills flex-column">
               <li class="nav-item">
                   <a  th:classappend="${activePage} == 'home' ? ' active' : ''" class="nav-link" href="/"><i class="bi bi-house me-2"></i>Home</a>
               </li>
               <li sec:authorize="hasAuthority('ALL') or hasAuthority('viewUser')" class="nav-item">
                   <a  th:classappend="${activePage} == 'users' ? ' active' : ''" class="nav-link" href="/users"><i class="bi bi-people me-2"></i>Users</a>
               </li>
               <li sec:authorize="hasAuthority('ALL') or hasAuthority('viewUser')" class="nav-item">
                   <a  th:classappend="${activePage} == 'admins' ? ' active' : ''" class="nav-link" href="/admins"><i class="bi bi-shield-lock me-2"></i>Admins</a>
               </li>
               <li class="nav-item">
                   <a  th:classappend="${activePage} == 'books' ? ' active' : ''" class="nav-link" href="/books"><i class="bi bi-book me-2"></i>Books</a>
               </li>
               <li  class="nav-item">
                   <a  th:classappend="${activePage} == 'bookissues' ? ' active' : ''" class="nav-link" href="/bookissues"><i class="bi bi-journal-text me-2"></i>Book Issues</a>
               </li>
               
               <li sec:authorize="hasAuthority('ALL')" class="nav-item">
                   <a  th:classappend="${activePage} == 'userRequests' ? ' active' : ''" class="nav-link" href="/registration/list"><i class="bi bi-journal-text me-2"></i>User Registration Requests</a>
               </li>
               
               
               <li sec:authorize="hasAuthority('ALL')" class="nav-item">
                   <a  th:classappend="${activePage} == 'setting' ? ' active' : ''" class="nav-link" href="/setting"><i class="bi bi-journal-text me-2"></i>Setting</a>
               </li>
               
               <li class="nav-item">
                   <a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
               </li>
           </ul>
       </div>
   </div>
</html>
