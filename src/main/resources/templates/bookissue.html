<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
	<head>
	    <meta charset="UTF-8">
	    <title>Library Management|Issued Book</title>
	    <meta name="viewport" content="width=device-width, initial-scale=1">
	    <!-- Bootstrap CSS + Bootstrap Icons -->
	    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
		<link rel="stylesheet" th:href="@{/assets/common.css}" />
	</head>
	<body>
		<div class="wrapper">
		   <div th:replace="fragments/sidebar :: sidebar(activePage='bookissues')"></div>
		
		    <div class="mainContent">
		    	<!-- Include the header fragment -->
    			<div th:replace="fragments/header :: header(name=${name}, email=${email}, pageTitle='Issued Books')"></div>	
		    	<!-- Main Content -->
		    	<div class="content">
		    		<div class="tableSearchContainer">
		    	 	 <!-- Search input -->
		    	 	 	<label>Search Issued Book</label>
					 	<input type="text" id="searchInput" class="searchField form-control" placeholder="Search by name, title etc...">
		    	 	</div>
		    	 	
		    	 	<a sec:authorize="hasAuthority('ALL') or hasAuthority('addBookIssue')"  class="btn btn-success rounded-circle" href="/bookissues/add" title="Issue A Book">
					  <i class="bi bi-plus"></i>
					 </a>
							    	 	
			    	 <div class="tableContainer">
	    				<div class="tableContent">
							<table id="userTable" class="table table-striped table-bordered align-middle">
						        <thead>
							         <tr>
					                    <th>Issue ID</th>
					                    <th>User Name</th>
					                    <th>Book Title</th>
					                    <th>Issue Date</th>
					                    <th>Due Date</th>
									    <th>Actual Return</th>
									    <th>Fine</th>
									    <th>Status</th>
					                   
					                    <th sec:authorize="hasAuthority('ALL')">Actions</th>
					                </tr>
						        </thead>
						        <tbody id="userTableBody">
							       <tr th:each="issue : ${bookissues}">
				                    <td th:text="${issue.issueId}"></td>
				                    <td th:text="${issue.user.name}"></td>
				                    <td th:text="${issue.book.title}"></td>
				                    <td th:text="${issue.issueDate}"></td>
				                    <td th:text="${issue.dueDate}"></td>
								    <td th:text="${issue.actualReturnDate}">—</td>
								    <td th:text="${#numbers.formatDecimal(issue.fineAmount, 1, 'COMMA', 2, 'POINT')}"></td>
								    <td th:text="${issue.fineStatus}"></td>
    
				                   
				                    <td sec:authorize="hasAuthority('ALL')">
				                    
				                    
				                    
				                     <!-- Return button if not returned -->
        <form th:if="${issue.actualReturnDate == null}"
              th:action="@{/bookissues/return/{id}(id=${issue.issueId})}" method="post" style="display:inline">
            <button type="submit" class="btn btn-sm btn-primary">Mark Returned</button>
        </form>
        
        
         <!-- Pay button if unpaid fine > 0 -->
        <form th:if="${issue.fineAmount != null and issue.fineAmount > 0 and issue.fineStatus.name() == 'UNPAID'}"
              th:action="@{/bookissues/pay/{id}(id=${issue.issueId})}" method="post" style="display:inline">
            <button type="submit" class="btn btn-sm btn-warning">Pay Fine</button>
        </form>
        
        
        
				                    
				                    
				                        <a class="action-link" th:href="@{/bookissues/delete/{id}(id=${issue.issueId})}"
				                           onclick="return confirm('Are you sure you want to delete this issue?');">Delete</a>
				                    </td>
				                </tr>
						        </tbody>
						    </table>
	    				</div>
	    			</div>
	    			
	    			<div class="tablePaginator">
	   					<!-- Pagination -->
					    <nav>
					        <ul id="pagination" class="pagination"></ul>
					    </nav>
	   				</div>
    			</div>
		    </div>
		</div>

		<!-- Bootstrap JS -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
		
		<script>
		    // Toggle sidebar on mobile
		    document.getElementById('sidebarToggle').addEventListener('click', function() {
		        document.getElementById('sidebar').classList.toggle('collapsed');
		    });
		    
		    document.addEventListener('DOMContentLoaded', () => {
		        const table = document.getElementById('userTable');
		        const tbody = document.getElementById('userTableBody');
		        const rows = Array.from(tbody.querySelectorAll('tr'));
		        const searchInput = document.getElementById('searchInput');
		        const pagination = document.getElementById('pagination');
		        const rowsPerPage = 5;
		        let currentPage = 1;
		        let filteredRows = rows.slice();
		        let sortAsc = true;

		        function renderTablePage() {
		            tbody.innerHTML = '';
		            let start = (currentPage - 1) * rowsPerPage;
		            let end = start + rowsPerPage;
		            filteredRows.slice(start, end).forEach(row => tbody.appendChild(row));
		            renderPagination();
		        }

		        function renderPagination() {
		            pagination.innerHTML = '';
		            let pageCount = Math.ceil(filteredRows.length / rowsPerPage);
		            for (let i = 1; i <= pageCount; i++) {
		                let li = document.createElement('li');
		                li.className = 'page-item' + (i === currentPage ? ' active' : '');
		                let a = document.createElement('a');
		                a.className = 'page-link';
		                a.textContent = i;
		                a.addEventListener('click', () => {
		                    currentPage = i;
		                    renderTablePage();
		                });
		                li.appendChild(a);
		                pagination.appendChild(li);
		            }
		        }

		        function searchTable() {
		            const query = searchInput.value.toLowerCase();
		            filteredRows = rows.filter(row =>
		                row.textContent.toLowerCase().includes(query)
		            );
		            currentPage = 1;
		            renderTablePage();
		        }

		        function sortTable(colIndex) {
		            filteredRows.sort((a, b) => {
		                let aText = a.children[colIndex].textContent.trim().toLowerCase();
		                let bText = b.children[colIndex].textContent.trim().toLowerCase();
		                return sortAsc ? aText.localeCompare(bText) : bText.localeCompare(aText);
		            });
		            sortAsc = !sortAsc;
		            renderTablePage();
		        }

		        // Init
		        renderTablePage();

		        // Events
		        searchInput.addEventListener('keyup', searchTable);
		        table.querySelectorAll('th.sortable').forEach((th, idx) => {
		            th.addEventListener('click', () => sortTable(idx));
		        });
		    });
		</script>
	</body>
</html>
