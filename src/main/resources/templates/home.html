<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
	<head>
	    <meta charset="UTF-8">
	    <title>Library Management Dashboard</title>
	    <meta name="viewport" content="width=device-width, initial-scale=1">
	
	    <!-- Bootstrap CSS + Bootstrap Icons -->
	    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
		 <link rel="stylesheet" th:href="@{/assets/common.css}" />
	</head>
	<body>
		<div class="wrapper">
		    <div th:replace="fragments/sidebar :: sidebar(activePage='home')"></div>
		
		    <div class="mainContent">
		    	<!-- Include the header fragment -->
    			<div th:replace="fragments/header :: header(name=${name}, email=${email}, pageTitle='Dashboard')"></div>
				
		    	<!-- Main Content -->
		    	 <div class="content d-flex justify-content-center align-items-center">
    				<div class="text-center">
    					<h2>Welcome <span th:text="${name}"></span> to the Library!</h2>
    				</div>
    			</div>
		    </div>
		</div>

		<!-- Bootstrap JS -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
		<script>
		    // Toggle sidebar on mobile
		    document.getElementById('sidebarToggle').addEventListener('click', function() {
		        document.getElementById('sidebar').classList.toggle('collapsed');
		    });
		</script>
	</body>
</html>
