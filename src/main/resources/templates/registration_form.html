<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Registration Request</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background: #fff;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            border-radius: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        h2 {
            text-align: center;
            color: #0056b3;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            color: #333;
        }

        input[type="text"],
        input[type="password"],
        input[type="hidden"],
        input[type="number"],
        input[type="date"] {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        input:focus {
            border-color: #2e86de;
            box-shadow: 0 0 8px rgba(46,134,222,0.3);
            outline: none;
        }

        .submit-btn {
            background-color: #007BFF;
            color: white;
            padding: 14px;
            margin-top: 25px;
            width: 100%;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .submit-btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            font-weight: bold;
            color: #800000;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #600000;
        }

        .message {
            text-align: center;
            margin-top: 15px;
            font-size: 1rem;
            font-weight: bold;
            color: green;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>User Registration Request</h2>
        <div id="message">
        	<div th:if="${error}">
			    <p style="color:red;">
			        <span th:text="${error}"></span>
			    </p>
 			</div>
        </div>

        <form th:action="@{/registration/submit}" th:object="${registrationRequest}" method="post"  onsubmit="return validateAndEncodePassword()">
        
            <label>UserName:</label>
            <input type="text" id="username" th:field="*{username}" required />
            <label>Password:</label>
            <input type="hidden" id="encodedpassword" th:field="*{password}" />
            <input type="password" id="userpassword" required />
            <label>Name:</label>
            <input type="text" id="name" th:field="*{name}" required />

            <label>Date of Birth:</label>
            <input type="date" th:field="*{DOB}" />

            <label>ID Type:</label>
            <input type="text" id="idtype" th:field="*{IDtype}" />

            <label>ID Number:</label>
            <input type="text" id="idnumber" th:field="*{IDnumber}" />

            <label>Education:</label>
            <input type="text" id="education" th:field="*{Education}" />

            <label>Permanent Address:</label>
            <input type="text"  th:field="*{permanent_address}" />

            <label>Local Address:</label>
            <input type="text" th:field="*{local_address}" />

            <label>Contact Number:</label>
            <input type="text" id="contactnumber" th:field="*{contactnumber}" />

            <label>Email ID:</label>
            <input type="text" id="emailid" th:field="*{EmailID}" />

            <button type="submit" class="submit-btn">Submit Registration Request</button>
        </form>

        <a th:href="@{/login}" class="back-link">⬅ Back to Login</a>
        <div class="message" th:if="${successMessage}" th:text="${successMessage}"></div>
    </div>
    
    
    <script type="text/javascript">
		function validateAndEncodePassword() {
			console.log("validate method call");
    		let message = document.getElementById("message");
    		let messageString = "";
    		
    		 // Get form values
    		let username = document.getElementById("username").value.trim();
    	    let password = document.getElementById("userpassword").value;
    	    let name = document.getElementById("name").value.trim();
    	    let idtype = document.getElementById("idtype").value.trim();
    	    let idnumber = document.getElementById("idnumber").value.trim();
    	    let education = document.getElementById("education").value.trim();
    	    let contactnumber = document.getElementById("contactnumber").value.trim();
    	    let emailid = document.getElementById("emailid").value.trim();
    
    		// Password validation regex
    		let regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;

		    if (!regex.test(password)) {
		        messageString += "<p>❌ Password must be at least 8 characters, include uppercase, lowercase, number, and special character.</p>";
		        console.log("password valid");
		    }
		    
		    // UserName validation: alphanumeric
		    if (!/^[A-Za-z0-9]+$/.test(username)) {
		        
		        messageString += "<p>❌ User Name must be alphanumeric.</p>";
		        console.log("username valid");
		    }
		    
		    // Name validation: only letters and spaces
		    if (!/^[A-Za-z\s]+$/.test(name)) {
		        
		        messageString += "<p>❌ Name must contain only letters and spaces.</p>";
		        console.log("name valid");
		    }

		    // ID Type validation: only letters and spaces
		    if (!/^[A-Za-z\s]+$/.test(idtype)) {
		        
		        messageString += "<p>❌ ID Type must contain only letters.</p>";
		        console.log("idtype valid");
		   }

		    // ID Number validation: alphanumeric
		    if (!/^[A-Za-z0-9]+$/.test(idnumber)) {
		        
		        messageString += "<p>❌ ID Number must be alphanumeric.</p>";
		        console.log("idnumber valid");
		   }

		    // Education validation: only letters and spaces
		    if (!/^[A-Za-z\s]+$/.test(education)) {
		        messageString += "<p>❌ Education must contain only letters.</p>";
		        console.log("education valid");
		    }

		    // Contact number validation: digits only, min 10 digits
		    if (!/^\d{10,}$/.test(contactnumber)) {
		        messageString += "<p>❌ Contact Number must contain at least 10 digits.</p>";
		        console.log("contactnumber valid");
		    }

		    // Email validation
		    let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
		    if (!emailRegex.test(emailid)) {
		        messageString += "<p>❌ Enter a valid Email ID.</p>";
		        console.log("email valid");
		   }
		    
		    console.log("messageString: "+ messageString);
		    if(messageString != ""){
		        console.log("error present");
		    	 message.style.color = "red";
		    	 message.innerHTML = messageString;
		    	 return false;
		    }
		    console.log("validation sucessfull");

		
		    // Encode password and set to hidden field
		    let encoded = btoa(unescape(encodeURIComponent(password)));
		    document.getElementById("encodedpassword").value = encoded;
		    message.innerHTML = ""; // clear any previous message
		
		    return true; // allow form submission
		}
	</script>

</body>
</html>
