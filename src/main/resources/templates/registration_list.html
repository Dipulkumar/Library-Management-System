<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registration Requests</title>
    <style>
        body { font-family:Arial, sans-serif; background:#f6f8fb; padding:30px; }
        .card { background:#fff; padding:20px; border-radius:10px; max-width:900px; margin:auto;
                box-shadow:0 4px 10px rgba(0,0,0,.08); }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:10px; border-bottom:1px solid #eee; text-align:left; }
        th { background:#f1f5f9; }
        .actions form { display:inline; }
        .btn { padding:8px 12px; border:none; border-radius:6px; cursor:pointer; }
        .btn-approve { background:#16a34a; color:#fff; }
        .btn-approve:hover { background:#15803d; }
        .btn-reject { background:#DC143C; color:#fff; }
        .btn-reject:hover { background:#8B0000; }
        .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        a.link { text-decoration:none; color:#2563eb; }
    </style>
     <meta name="viewport" content="width=device-width, initial-scale=1">
	    <!-- Bootstrap CSS + Bootstrap Icons -->
	    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
		<link rel="stylesheet" th:href="@{/assets/common.css}" />
</head>
<body>
<div class="wrapper">
		   <div th:replace="fragments/sidebar :: sidebar(activePage='userRequests')"></div>
		
		    <div class="mainContent">
		    	<!-- Include the header fragment -->
    			<div th:replace="fragments/header :: header(name=${name}, email=${email}, pageTitle='Registration Requests')"></div>	
		    	<!-- Main Content -->
		    	<div class="content">
		    	<div class="tableSearchContainer">
		    	 	 <!-- Search input -->
		    	 	 	<label>Search User Registration Requests</label>
					 	<input type="text" id="searchInput" class="searchField form-control" placeholder="Search by name, title etc...">
		    	 	</div>
    
     <div class="tableContainer">
	 	<div class="tableContent">
			<table id="userRequestsTable" class="table table-striped table-bordered align-middle">
			<thead>
				<tr>
		            <th>ID</th>
		            <th>UserName</th>
		            <th>Name</th>
		            <th>DOB</th>
		            <th>ID Type</th>
		            <th>ID Number</th>
		            <th>Education</th>
		            <th>Permanent Address</th>
		            <th>Local Address</th>
		            <th>contact Number</th>
		            <th>EmailID</th>
		            <th>User ID</th>
		            <th>Verifier ID</th>
		            <th>Actions</th>
		          
		         </tr>
			    </thead>
				<tbody id="userRequestsTableBody">
				 <tr th:each="r : ${requests}">
			      	<td th:text="${r.requestId}"></td>
			        <td th:text="${r.username}"></td>
			        <td th:text="${r.name}"></td>
			        <td th:text="${r.DOB}"></td>
			        <td th:text="${r.IDtype}"></td>
			        <td th:text="${r.IDnumber}"></td>
			        <td th:text="${r.Education}"></td>
			        <td th:text="${r.permanent_address}"></td>
			        <td th:text="${r.local_address}"></td>
			        <td th:text="${r.contactnumber}"></td>
			        <td th:text="${r.EmailID}"></td>
			        <td th:text="${r.user != null ? r.user.name : ''}"></td>
			        <td th:text="${r.verifier != null ? r.verifier.name : ''}"></td>
			        <td class="actions">
			         	<!-- Show Approve button only if request is pending -->
		            	<form th:if="${r.status == 'PENDING'}" th:action="@{'/registration/approve/' + ${r.requestId}}" method="post">
				    		<button type="submit" class="btn btn-approve">Approve</button>
				        </form>
				
						<form th:if="${r.status == 'PENDING'}" th:action="@{'/registration/reject/' + ${r.requestId}}" method="post">
				    		<button type="submit" class="btn btn-reject">reject</button>
				        </form>
				
				        <!-- Show text if already approved -->
				        <span th:if="${r.status == 'APPROVED'}">Approved</span>
				
				        <!-- Show text if rejected -->
				        <span th:if="${r.status == 'REJECTED'}">Rejected</span>
				       

                       </td>
       				</tr>
				
				</tbody>
			</table>
		</div>
	</div>
	<div class="tablePaginator">
		<!-- Pagination -->
		<nav>
			<ul id="pagination" class="pagination"></ul>
		</nav>
	 </div>						
							
    
    

</div>
</div>
<!-- Bootstrap JS -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
		
		<script>
		    // Toggle sidebar on mobile
		    document.getElementById('sidebarToggle').addEventListener('click', function() {
		        document.getElementById('sidebar').classList.toggle('collapsed');
		    });
		    
		    document.addEventListener('DOMContentLoaded', () => {
		        const table = document.getElementById('userRequestsTable');
		        const tbody = document.getElementById('userRequestsTableBody');
		        const rows = Array.from(tbody.querySelectorAll('tr'));
		        const searchInput = document.getElementById('searchInput');
		        const pagination = document.getElementById('pagination');
		        const rowsPerPage = 5;
		        let currentPage = 1;
		        let filteredRows = rows.slice();
		        let sortAsc = true;

		        function renderTablePage() {
		            tbody.innerHTML = '';
		            let start = (currentPage - 1) * rowsPerPage;
		            let end = start + rowsPerPage;
		            filteredRows.slice(start, end).forEach(row => tbody.appendChild(row));
		            renderPagination();
		        }

		        function renderPagination() {
		            pagination.innerHTML = '';
		            let pageCount = Math.ceil(filteredRows.length / rowsPerPage);
		            for (let i = 1; i <= pageCount; i++) {
		                let li = document.createElement('li');
		                li.className = 'page-item' + (i === currentPage ? ' active' : '');
		                let a = document.createElement('a');
		                a.className = 'page-link';
		                a.textContent = i;
		                a.addEventListener('click', () => {
		                    currentPage = i;
		                    renderTablePage();
		                });
		                li.appendChild(a);
		                pagination.appendChild(li);
		            }
		        }

		        function searchTable() {
		            const query = searchInput.value.toLowerCase();
		            filteredRows = rows.filter(row =>
		                row.textContent.toLowerCase().includes(query)
		            );
		            currentPage = 1;
		            renderTablePage();
		        }

		        function sortTable(colIndex) {
		            filteredRows.sort((a, b) => {
		                let aText = a.children[colIndex].textContent.trim().toLowerCase();
		                let bText = b.children[colIndex].textContent.trim().toLowerCase();
		                return sortAsc ? aText.localeCompare(bText) : bText.localeCompare(aText);
		            });
		            sortAsc = !sortAsc;
		            renderTablePage();
		        }

		        // Init
		        renderTablePage();

		        // Events
		        searchInput.addEventListener('keyup', searchTable);
		        table.querySelectorAll('th.sortable').forEach((th, idx) => {
		            th.addEventListener('click', () => sortTable(idx));
		        });
		    });
		</script>
</body>
</html>
